<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Student Performance</h1>
    <p class="subtitle">AI-powered analysis of student academic outcomes</p>

    <form action="/predict" method="POST">
        
        <div class="form-group">
            <label>Sex</label>
            <select name="sex">
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" min="10" max="25" placeholder="e.g. 15" required>
        </div>

        <div class="form-group">
            <label>Mother's Education (0-4)</label>
            <input type="number" name="Medu" min="0" max="4" placeholder="0 = None, 4 = Higher Ed" required>
        </div>

        <div class="form-group">
            <label>Father's Education (0-4)</label>
            <input type="number" name="Fedu" min="0" max="4" placeholder="0 = None, 4 = Higher Ed" required>
        </div>

        <div class="form-group">
            <label>Mother's Job</label>
            <select name="Mjob">
                <option value="0">Teacher</option>
                <option value="1">Health Care</option>
                <option value="2">Civil Services</option>
                <option value="3">At Home</option>
                <option value="4">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Father's Job</label>
            <select name="Fjob">
                <option value="0">Teacher</option>
                <option value="1">Health Care</option>
                <option value="2">Civil Services</option>
                <option value="3">At Home</option>
                <option value="4">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Study Time (1-4)</label>
            <input type="number" name="studytime" min="1" max="4" placeholder="Weekly hours level" required>
        </div>

        <div class="form-group">
            <label>Free Time (1-5)</label>
            <input type="number" name="freetime" min="1" max="5" placeholder="Amount of free time" required>
        </div>

        <div class="form-group">
            <label>Going Out (1-5)</label>
            <input type="number" name="goout" min="1" max="5" placeholder="Frequency of going out" required>
        </div>

        <div class="form-group">
            <label>Health Status (1-5)</label>
            <input type="number" name="health" min="1" max="5" placeholder="Current health level" required>
        </div>

        <div class="form-group">
            <label>Number of Absences</label>
            <input type="number" name="absences" min="0" max="93" placeholder="Total days absent" required>
        </div>

        <div class="form-group">
            <label>Previous Grade (G1)</label>
            <input type="number" name="G1" min="0" max="20" placeholder="Score from 0 to 20" required>
        </div>

        <div class="form-group full-width">
            <button type="submit">Predict Performance</button>
        </div>

    </form>
</div>

</body>
</html>
